# SafetySense - Optimized BoT-SORT config
tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 300        # 300 frame (~10 saniye 30fps'de) — ID kaybını minimize et
match_thresh: 0.80       # Doküman önerisi — Eşleşme kararlılığı artırıldı
fuse_score: True

# BoT-SORT specifics
gmc_method: sparseOptFlow  # Kamera hareketi kompanzasyonu

# ReID (CPU'da ağır, şimdilik kapalı)
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
model: auto
