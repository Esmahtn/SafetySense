# SafetySense - Optimized BoT-SORT config
tracker_type: botsort
track_high_thresh: 0.15
track_low_thresh: 0.05
new_track_thresh: 0.15
track_buffer: 150        # 150 frame (~5 saniye 30fps'de) — Daha dinamik
match_thresh: 0.70       # Daha esnek eşleşme
fuse_score: True

# BoT-SORT specifics
gmc_method: sparseOptFlow  # Kamera hareketi kompanzasyonu

# ReID (CPU'da ağır, şimdilik kapalı)
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
model: auto
