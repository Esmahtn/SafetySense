<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafetySense | Güvenli Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Outfit:wght@900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020203; 
            color: white; 
            overflow: hidden;
        }
        .glass { 
            background: rgba(10, 10, 12, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(220,38,38,0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">
    <div class="glow animate-pulse"></div>
    
    <div class="glass p-12 rounded-[50px] shadow-2xl relative z-10 w-full max-w-md border-t border-red-600/30">
        <div class="flex flex-col items-center mb-10">
            <div class="w-20 h-20 bg-red-600 rounded-[30px] flex items-center justify-center shadow-2xl shadow-red-600/40 mb-6 rotate-6 group-hover:rotate-0 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
            </div>
            <h1 class="text-4xl font-[Outfit] font-black tracking-tighter italic text-center">SafetySense <span class="text-red-600">AI</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-2">Güvenli Yönetim Sistemi</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div id="errorMsg" class="hidden bg-red-600/20 border border-red-600/50 text-red-500 text-xs font-bold p-4 rounded-2xl text-center uppercase tracking-widest"></div>
            
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 mb-2">Kullanıcı Adı</label>
                <input type="text" id="username" required class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-sm text-white focus:border-red-500 focus:bg-black outline-none transition-all" placeholder="admin veya user">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2 mb-2">Şifre</label>
                <input type="password" id="password" required class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-sm text-white focus:border-red-500 focus:bg-black outline-none transition-all" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full py-4 mt-4 bg-red-600 hover:bg-red-700 text-white font-black text-xs rounded-2xl transition-all shadow-lg shadow-red-600/30 uppercase tracking-widest">
                SİSTEME GİRİŞ YAP
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('errorMsg');

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                const data = await res.json();
                if (data.status === 'success') {
                    window.location.href = '/';
                } else {
                    err.innerText = data.message;
                    err.classList.remove('hidden');
                }
            } catch (error) {
                err.innerText = "Sunucu ile bağlantı kurulamadı.";
                err.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
